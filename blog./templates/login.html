{% extends "base.html" %}
{% block title %}Přihlášení{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <p class="eyebrow">Administrace</p>
    <h1>Přihlášení</h1>
    <p>Zadejte heslo pro správu blogu.</p>
    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="field">
        <label for="password">Heslo</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required autofocus />
      </div>
      <button class="btn btn-accent" type="submit" style="width:100%;justify-content:center">Přihlásit se</button>
    </form>
  </div>
</div>
{% endblock %}
